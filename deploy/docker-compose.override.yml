# Local development overrides — not committed, use for hot reload
# Usage: docker-compose up  (this file is auto-loaded)
services:
  api:
    build:
      target: builder
    volumes:
      - ../backend:/app
    environment:
      - ENV=development
    command: ["go", "run", "./cmd/api"]

  frontend:
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
